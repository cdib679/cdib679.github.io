<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found · Aria Rossi</title>
  <link rel="stylesheet" href="/css/style.css" />
  <!--
    GitHub Pages serves this file for any path it can't resolve.
    The script below handles the clean URL redirect for non-root paths,
    so /about, /listen, /projects, /contact all work without .html.
  -->
  <script>
    (function () {
      // Redirect /about → /about/index.html (served by GH Pages)
      // This works because our pages live in subfolders with index.html
      // so GitHub Pages already handles /about automatically.
      // This 404.html is only a fallback — no redirect needed here.
    })();
  </script>
</head>
<body>
  <script src="/js/layout.js"></script>
  <main class="page-content" style="min-height:70vh; display:flex; align-items:center; justify-content:center; text-align:center; flex-direction:column; gap:1.5rem;">
    <span class="section-label">404</span>
    <h1 style="font-size:clamp(2rem,6vw,4rem);">Page not found</h1>
    <p style="color:var(--warm-mid);">The page you're looking for doesn't exist.</p>
    <a href="/" class="btn btn-fill">Back to Home</a>
  </main>
  <script src="/js/main.js"></script>
</body>
</html>
